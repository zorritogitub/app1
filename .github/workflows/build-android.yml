name: Build Android App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Copy files to www
      run: |
        mkdir -p www
        cp index.html www/
        cp amor.mp3 www/

    - name: Setup Capacitor and add Local Notifications plugin
      run: |
        npx cap init MiNovia com.tunombre.minovia --web-dir=www
        npx cap add android

    - name: Sync Capacitor (includes LocalNotifications plugin)
      run: npx cap sync android

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew

    - name: Add LocalNotifications to AndroidManifest
      run: |
        # Agregar permisos de notificación al AndroidManifest.xml
        MANIFEST="android/app/src/main/AndroidManifest.xml"
        # Agregar permiso POST_NOTIFICATIONS (Android 13+)
        sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\n    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />\n    <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />|' "$MANIFEST"
        echo "=== AndroidManifest.xml actualizado ==="
        cat "$MANIFEST"

    - name: Build APK
      run: |
        cd android
        ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
